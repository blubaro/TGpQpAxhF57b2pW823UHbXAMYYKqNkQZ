<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F4F2EC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Coach Runner</title>
<link rel="manifest" href='data:application/json,{"name":"Coach Runner","short_name":"Runner","start_url":"./","display":"standalone","background_color":"%23F4F2EC","theme_color":"%23F4F2EC","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27%3E%3Crect width=%27192%27 height=%27192%27 rx=%2742%27 fill=%27%23E5562C%27/%3E%3Ccircle cx=%2796%27 cy=%2774%27 r=%2734%27 fill=%27none%27 stroke=%27%23F4F2EC%27 stroke-width=%2714%27/%3E%3Crect x=%2766%27 y=%27118%27 width=%2760%27 height=%2722%27 rx=%2711%27 fill=%27%23F4F2EC%27/%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}'>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%23E5562C'/%3E%3Ccircle cx='96' cy='74' r='34' fill='none' stroke='%23F4F2EC' stroke-width='14'/%3E%3Crect x='66' y='118' width='60' height='22' rx='11' fill='%23F4F2EC'/%3E%3C/svg%3E">
<style>
:root{
  --paper:#F4F2EC; --card:#FFFFFF; --ink:#1A1813; --muted:#8C887C;
  --line:#E5E1D6; --line-strong:#D6D1C4;
  --accent:#E5562C; --accent-ink:#B53C18; --accent-soft:#FBE7DE;
  --rest:#1F8A8A; --rest-soft:#DCF0EF;
  --good:#2C9645; --good-soft:#E0F0E3;
  --shadow:0 1px 2px rgba(26,24,19,.04),0 4px 16px rgba(26,24,19,.05);
  --r:18px; --r-sm:12px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--paper); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;
  font-feature-settings:"tnum" 1; -webkit-font-smoothing:antialiased;
  line-height:1.45; overscroll-behavior-y:none;
}
.tnum{font-variant-numeric:tabular-nums}
#app{max-width:520px;margin:0 auto;height:100%;min-height:100%;display:flex;flex-direction:column}
#topbar:empty{display:none}
#actionbar:empty{display:none}
.scroll{flex:1;overflow-y:auto;padding:20px 18px 140px;-webkit-overflow-scrolling:touch}

/* ---- typography ---- */
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
h1{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.15}
h2{font-size:19px;font-weight:750;letter-spacing:-.01em}
.big-num{font-weight:800;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums}
.muted{color:var(--muted)}
.center{text-align:center}

/* ---- top bar ---- */
.topbar{position:sticky;top:0;z-index:20;background:var(--paper);
  display:flex;align-items:center;gap:12px;padding:14px 18px 10px;
  border-bottom:1px solid var(--line)}
.topbar .prog-wrap{flex:1}
.topbar .prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
.bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden}
.bar > i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .35s ease}
.iconbtn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line-strong);
  background:var(--card);font-size:17px;display:grid;place-items:center;color:var(--ink)}

/* ---- cards ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.card.flush{padding:0;overflow:hidden}

/* ---- buttons ---- */
.btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
  min-height:58px;border-radius:var(--r-sm);border:none;font-size:17px;font-weight:700;
  background:var(--accent);color:#fff;cursor:pointer;transition:transform .08s,filter .15s}
.btn:active{transform:scale(.985)}
.btn:disabled{opacity:.4}
.btn.sec{background:var(--card);color:var(--ink);border:1.5px solid var(--line-strong)}
.btn.ghost{background:transparent;color:var(--muted);min-height:48px;font-weight:600;border:none}
.btn.good{background:var(--good)}
.btn.sm{min-height:46px;font-size:15px}
.btn-row{display:flex;gap:10px}

/* ---- bottom action bar ---- */
.actionbar{position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:linear-gradient(to top,var(--paper) 72%,transparent);
  padding:14px 18px calc(14px + var(--safe-b));max-width:520px;margin:0 auto}

/* ---- steppers ---- */
.field{margin:14px 0}
.field .lab{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:baseline}
.field .lab .hint{text-transform:none;letter-spacing:0;font-weight:600;color:var(--muted)}
.stepper{display:flex;align-items:stretch;gap:10px}
.stepper button{width:60px;flex:none;border:1.5px solid var(--line-strong);background:var(--card);
  border-radius:14px;font-size:26px;font-weight:600;color:var(--ink);cursor:pointer}
.stepper button:active{background:var(--paper)}
.stepper .val{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:1.5px solid var(--line);border-radius:14px;background:var(--paper);padding:6px 0}
.stepper .val b{font-size:30px;font-weight:800;line-height:1}
.stepper .val small{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 15px;border-radius:99px;border:1.5px solid var(--line-strong);
  background:var(--card);font-weight:700;font-size:15px;cursor:pointer;color:var(--ink)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}

input.txt,textarea.txt{width:100%;border:1.5px solid var(--line);border-radius:12px;
  background:var(--paper);padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink)}
textarea.txt{resize:vertical;min-height:64px}

/* checklist */
.check{display:flex;align-items:center;gap:13px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.check:last-child{border-bottom:none}
.check .box{width:26px;height:26px;flex:none;border:2px solid var(--line-strong);border-radius:8px;display:grid;place-items:center;font-size:15px;color:#fff}
.check.on .box{background:var(--good);border-color:var(--good)}
.check.on span{color:var(--muted);text-decoration:line-through}

/* big timer */
.timer{display:flex;flex-direction:column;align-items:center;padding:6px 0}
.timer .ring{position:relative;width:230px;height:230px;display:grid;place-items:center;margin:6px 0}
.timer .ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.timer .ring .t-val{font-size:62px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.timer .ring .t-sub{font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.phase-work .ring circle.fg{stroke:var(--accent)}
.phase-rest .ring circle.fg{stroke:var(--rest)}
.phase-work .t-sub{color:var(--accent-ink)}
.phase-rest .t-sub{color:var(--rest)}

.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;
  font-size:13px;font-weight:700;background:var(--paper);border:1px solid var(--line)}
.pill.work{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}
.pill.rest{background:var(--rest-soft);color:var(--rest);border-color:transparent}
.pill.z2{background:var(--good-soft);color:var(--good);border-color:transparent}

.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px}
.kv:last-child{border-bottom:none}
.kv b{font-weight:750}
.tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 9px;border-radius:7px;background:var(--accent-soft);color:var(--accent-ink)}
.tag.row{background:var(--rest-soft);color:var(--rest)}
.tag.done{background:var(--good-soft);color:var(--good)}

.stack-sm > * + *{margin-top:8px}
.set-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px}
.set-row:last-child{border-bottom:none}
.set-row .n{width:26px;height:26px;flex:none;border-radius:7px;background:var(--paper);display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--muted)}
.set-row .n.ok{background:var(--good);color:#fff}

.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:99px;font-size:14px;font-weight:600;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.divider{height:1px;background:var(--line);margin:16px 0}
.note{font-size:13.5px;color:var(--muted);background:var(--paper);border-radius:12px;padding:11px 13px;border:1px solid var(--line)}
.celebrate{background:linear-gradient(135deg,var(--accent),#F2811B);color:#fff;border:none}
.celebrate .eyebrow,.celebrate .muted{color:rgba(255,255,255,.85)}
.hidden{display:none!important}
.phase-ready .ring circle.fg{stroke:var(--accent)}
.phase-ready .t-sub{color:var(--accent-ink)}
.pill.ready{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}
.ov-row{display:flex;align-items:baseline;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px}
.ov-row:last-child{border-bottom:none}
.ov-row .oi{width:22px;flex:none;color:var(--muted);font-weight:800;font-size:13px}
.ov-row .od{margin-left:auto;color:var(--muted);font-weight:700;font-size:13.5px;white-space:nowrap}
a{color:var(--accent-ink)}
::selection{background:var(--accent-soft)}
</style>
</head>
<body>
<div id="app"><div id="topbar"></div><div class="scroll" id="screen"></div></div>
<div id="actionbar" class="actionbar"></div>
<div id="toast" class="toast"></div>

<script>
"use strict";
/* ============================================================
   Coach Runner v2  —  rendert workout-spec, gibt workout-result
   Single file, vanilla JS, offline-tauglich. schemaVersion 1.
   ============================================================ */

const SCHEMA = 1;
const SAVE_KEY = "coachRunner.session.v1";
const WD = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];

// Feste HF-Zonen (aus Coach §8) — für Anzeige + Zonen-Berechnung
const HR_ZONES = [
  {z:"Z1",lo:121,hi:134,name:"Erholung"},
  {z:"Z2",lo:134,hi:148,name:"Grundlage / UT2"},
  {z:"Z3",lo:148,hi:162,name:"Tempo / UT1"},
  {z:"Z4",lo:162,hi:175,name:"Schwelle"},
  {z:"Z5",lo:175,hi:189,name:"VO2max"},
];
function zoneForHr(hr){
  if(!hr) return null;
  for(const z of HR_ZONES){ if(hr>=z.lo && hr<z.hi) return z.z; }
  return hr<121 ? "Z1" : "Z5";
}

/* ---------- global state ---------- */
let S = {
  screen:"import",      // import | ready | run | summary
  spec:null,
  result:null,          // working clone, mutated with logs
  stepIdx:0,
  sub:{},               // per-step transient progress
  startedAt:null,
};

/* ---------- DOM helpers ---------- */
const $ = id => document.getElementById(id);
const screenEl = $("screen"), barEl = $("actionbar"), toastEl = $("toast"), topEl = $("topbar");
function h(html){ return html; }
function setTop(html){ topEl.innerHTML = html || ""; }
function setScreen(html){ setTop(""); screenEl.innerHTML = html; screenEl.scrollTop = 0; }
function setRun(html){ setTop(topbar()); screenEl.innerHTML = html; screenEl.scrollTop = 0; }
function setBar(html){ barEl.innerHTML = html; }
let toastT;
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove("show"),1600); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function mmss(sec){ sec=Math.max(0,Math.round(sec)); const m=Math.floor(sec/60),s=sec%60; return m+":"+String(s).padStart(2,"0"); }

/* ---------- audio (robust: bei jeder Geste + Sichtbarkeit entsperrt) ---------- */
let AC=null, soundOn=true;
try{ const sv=localStorage.getItem("coachRunner.sound"); if(sv!=null) soundOn=(sv!=="0"); }catch(e){}
function unlockAudio(){
  try{
    if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended") AC.resume();
    if(!AC._warmed){ // iOS: stummen Buffer abspielen, damit der Kontext wirklich „aufwacht“
      const b=AC.createBuffer(1,1,22050), src=AC.createBufferSource();
      src.buffer=b; src.connect(AC.destination); src.start(0); AC._warmed=true;
    }
  }catch(e){}
}
// JEDE Nutzer-Interaktion hält den Audio-Kontext am Leben (iOS/PWA suspendieren ihn sonst)
["pointerdown","touchstart","click","keydown"].forEach(ev=>
  document.addEventListener(ev,()=>{ if(soundOn) unlockAudio(); },{passive:true}));
function beep(freq=880,dur=0.14,vol=0.25){
  if(!soundOn) return;
  if(!AC){ unlockAudio(); }
  if(!AC) return;
  if(AC.state==="suspended"){ try{AC.resume();}catch(e){} }
  try{
    const o=AC.createOscillator(), g=AC.createGain();
    o.frequency.value=freq; o.type="sine";
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+dur);
  }catch(e){}
}
function cueWork(){ beep(880,.12); setTimeout(()=>beep(1100,.16),140); vibrate([60,40,90]); }
function cueRest(){ beep(520,.18); vibrate(70); }
function cueDone(){ beep(660,.12); setTimeout(()=>beep(880,.12),130); setTimeout(()=>beep(1320,.22),270); vibrate([80,50,80,50,140]); }
function cueTick(){ beep(700,.07,.18); vibrate(30); }
function cueSoft(){ beep(440,.20,.10); vibrate(40); }
function cueSoftTick(){ beep(560,.07,.12); vibrate(20); } // sanfter Tick für Mobility
function cueLead(){ beep(760,.09,.20); vibrate(35); }     // Countdown-Tick vor dem Start
function vibrate(p){ if(navigator.vibrate) try{navigator.vibrate(p);}catch(e){} }
function toggleSound(){
  soundOn=!soundOn;
  try{ localStorage.setItem("coachRunner.sound",soundOn?"1":"0"); }catch(e){}
  if(soundOn){ unlockAudio(); beep(880,.1); }
  if(S.screen==="run") setTop(topbar());
  toast(soundOn?"🔔 Ton-Guide an":"🔕 Ton-Guide aus");
}

/* ---------- wake lock ---------- */
let wakeLock=null;
async function keepAwake(){
  try{ if("wakeLock" in navigator){ wakeLock=await navigator.wakeLock.request("screen"); } }catch(e){}
}
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible"){ if(S.screen==="run") keepAwake(); if(soundOn) unlockAudio(); } });

/* ---------- timer engine ---------- */
const Timer = {
  raf:null, endsAt:0, dur:0, onTick:null, onDone:null, paused:false, remainAtPause:0,
  start(durSec,onTick,onDone){
    this.stop(); this.dur=durSec; this.endsAt=performance.now()+durSec*1000;
    this.onTick=onTick; this.onDone=onDone; this.paused=false; this.loop();
  },
  loop(){
    const step=()=>{
      if(this.paused) return;
      const remain=(this.endsAt-performance.now())/1000;
      if(this.onTick) this.onTick(Math.max(0,remain),this.dur);
      if(remain<=0){ this.stop(); if(this.onDone) this.onDone(); return; }
      this.raf=requestAnimationFrame(step);
    };
    this.raf=requestAnimationFrame(step);
  },
  pause(){ if(this.paused||!this.dur)return; this.paused=true; this.remainAtPause=(this.endsAt-performance.now())/1000; cancelAnimationFrame(this.raf); },
  resume(){ if(!this.paused)return; this.paused=false; this.endsAt=performance.now()+this.remainAtPause*1000; this.loop(); },
  add(sec){ this.endsAt+=sec*1000; },
  stop(){ cancelAnimationFrame(this.raf); this.raf=null; this.dur=0; this.paused=false; },
};
// count-up (cardio)
const UpTimer = {
  raf:null, startAt:0, onTick:null, paused:false, acc:0,
  start(onTick){ this.stop(); this.startAt=performance.now(); this.onTick=onTick; this.acc=0; this.paused=false; this.loop(); },
  loop(){ const step=()=>{ if(this.paused)return;
      const e=this.acc+(performance.now()-this.startAt)/1000; if(this.onTick)this.onTick(e);
      this.raf=requestAnimationFrame(step); }; this.raf=requestAnimationFrame(step); },
  pause(){ if(this.paused)return; this.paused=true; this.acc+=(performance.now()-this.startAt)/1000; cancelAnimationFrame(this.raf); },
  resume(){ if(!this.paused)return; this.paused=false; this.startAt=performance.now(); this.loop(); },
  elapsed(){ return this.paused?this.acc:this.acc+(performance.now()-this.startAt)/1000; },
  stop(){ cancelAnimationFrame(this.raf); this.raf=null; this.paused=false; this.acc=0; },
};

/* ---------- progress ring svg ---------- */
function ring(frac,sub,val){
  const r=100, c=2*Math.PI*r, off=c*(1-frac);
  return `<div class="ring">
    <svg viewBox="0 0 230 230"><circle cx="115" cy="115" r="${r}" fill="none" stroke="var(--line)" stroke-width="14"/>
    <circle class="fg" cx="115" cy="115" r="${r}" fill="none" stroke-width="14" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>
    <div class="center"><div class="t-val tnum">${val}</div><div class="t-sub">${sub}</div></div></div>`;
}

/* ---------- Vorlaufzeit / Countdown vor jedem Timer ---------- */
let LEAD_SEC=6;
try{ const lv=parseInt(localStorage.getItem("coachRunner.lead"),10); if(lv===0||lv===3||lv===6||lv===10) LEAD_SEC=lv; }catch(e){}
function getLead(){ return LEAD_SEC; }
const Lead={active:false,onGo:null};
function leadIn(seconds,label,onGo){
  seconds=Math.round(seconds||0);
  if(seconds<=0){ onGo(); return; }
  Lead.active=true; Lead.onGo=onGo;
  setRun(`<div class="phase-ready">
    <div class="center" style="margin:6px 0"><span class="pill ready">Bereit machen</span></div>
    <h1 class="center" style="margin:10px 0 0;font-size:22px">${esc(label||"Gleich geht's los")}</h1>
    <div class="timer" id="leadWrap">${ring(1,"start in",String(seconds))}</div>
    <p class="center muted" style="margin-top:6px">In Position gehen…</p>
  </div>`);
  setBar(`<button class="btn sec" onclick="leadSkip()">Sofort starten</button>`);
  let last=seconds+1;
  Timer.start(seconds,(rem,dur)=>{
    const w=$("leadWrap"); if(w) w.innerHTML=ring(rem/dur,"start in",String(Math.ceil(rem)));
    const c=Math.ceil(rem);
    if(c!==last && c>=1 && c<=5){ last=c; cueLead(); }
  },()=>{ leadFire(); });
}
function leadSkip(){ if(!Lead.active) return; Timer.stop(); leadFire(); }
function leadFire(){ if(!Lead.active) return; Lead.active=false; const go=Lead.onGo; Lead.onGo=null; if(go) go(); }
function secLabel(sec){ return sec>=60 ? mmss(sec) : (sec+"s"); }

/* ============================================================
   JSON import / validation
   ============================================================ */
function extractJSON(raw){
  if(!raw) return null;
  let t=raw.trim();
  const fence=t.match(/```(?:json)?\s*([\s\S]*?)```/i);
  if(fence) t=fence[1].trim();
  try{ return JSON.parse(t); }catch(e){}
  const a=t.indexOf("{"), b=t.lastIndexOf("}");
  if(a>=0 && b>a){ try{ return JSON.parse(t.slice(a,b+1)); }catch(e){} }
  return null;
}
function validateSpec(o){
  const errs=[];
  if(!o||typeof o!=="object") return ["Kein gültiges JSON gefunden."];
  if(o.kind!=="workout-spec") errs.push('Feld "kind" muss "workout-spec" sein.');
  if(!Array.isArray(o.steps)||!o.steps.length) errs.push('"steps" fehlt oder ist leer.');
  (o.steps||[]).forEach((s,i)=>{ if(!s.id) errs.push(`Schritt ${i+1}: "id" fehlt.`);
    if(!s.type) errs.push(`Schritt ${i+1}: "type" fehlt.`); });
  return errs;
}

/* ============================================================
   IMPORT screen
   ============================================================ */
function renderImport(){
  S.screen="import";
  const saved=loadSaved();
  setScreen(`
    <div style="padding-top:8px">
      <div class="eyebrow">Coach Runner</div>
      <h1 style="margin:6px 0 4px">Workout laden</h1>
      <p class="muted" style="margin-bottom:18px">Den <b>workout-spec</b> JSON-Block aus dem Coach-Chat hier einfügen.</p>
      ${saved?`<div class="card celebrate" style="margin-bottom:14px">
        <div class="eyebrow">Unterbrochene Session</div>
        <div style="font-weight:750;margin:4px 0 12px">${esc(saved.spec?.meta?.focus||"Workout")} · ${saved.spec?.steps?.length||0} Schritte</div>
        <div class="btn-row">
          <button class="btn good sm" onclick="resumeSaved()">Fortsetzen</button>
          <button class="btn sec sm" onclick="discardSaved()">Verwerfen</button>
        </div></div>`:""}
      <div class="card">
        <textarea class="txt" id="jsonIn" rows="9" placeholder='{ "kind": "workout-spec", ... }'></textarea>
        <div id="impErr" style="margin-top:10px"></div>
      </div>
      <p class="muted center" style="font-size:12.5px">Läuft lokal · keine Daten verlassen dein Gerät</p>
    </div>`);
  setBar(`<button class="btn" onclick="doImport()">Workout einlesen</button>`);
}
function doImport(){
  unlockAudio();
  const raw=$("jsonIn").value;
  const o=extractJSON(raw);
  const errs=validateSpec(o);
  if(errs.length){
    $("impErr").innerHTML=`<div class="note" style="color:var(--accent-ink);border-color:var(--accent)">
      <b>Konnte nicht eingelesen werden:</b><br>${errs.map(esc).join("<br>")}</div>`;
    return;
  }
  if(o.schemaVersion && o.schemaVersion>SCHEMA){
    $("impErr").innerHTML=`<div class="note">Hinweis: Spec ist Schema v${o.schemaVersion}, App kennt v${SCHEMA}. Ich versuche es trotzdem.</div>`;
  }
  S.spec=o;
  S.result=JSON.parse(JSON.stringify(o));
  S.result.kind="workout-result";
  S.stepIdx=0; S.sub={}; S.startedAt=null;
  renderReady();
}

/* ============================================================
   READY / overview
   ============================================================ */
function focusTag(s){
  const map={strength:"Kraft",superset:"Superset",interval:"Intervall",circuit:"Core",cardio:"Ausdauer",carry:"Carry",warmup:"Warmup",cooldown:"Cooldown",mobility:"Mobility",plyo:"Plyo"};
  return map[s.type]||s.type;
}
function stepTitle(s){
  if(s.type==="warmup")return "Aufwärmen";
  if(s.type==="cooldown")return "Cooldown";
  if(s.type==="circuit")return s.label||"Core-Finisher";
  if(s.type==="interval")return s.label||"Intervall";
  if(s.type==="superset")return s.label||"Superset";
  if(s.type==="cardio")return ({row:"Rudern",run:"Laufen",bike:"Bike"})[s.modality]||"Ausdauer";
  if(s.type==="carry")return s.name||"Carry";
  if(s.type==="mobility")return s.label||"Mobility";
  if(s.type==="plyo")return s.name||"Sprungkraft";
  return s.name||"Übung";
}
function renderReady(){
  S.screen="ready";
  const m=S.spec.meta||{}, rd=S.spec.readiness||{};
  const rows=S.spec.steps.map(s=>`<div class="kv">
      <span><span class="tag ${s.type==='cardio'||s.type==='mobility'?'row':''}">${esc(focusTag(s))}</span> &nbsp;${esc(stepTitle(s))}</span>
      <b class="muted">${stepMetaShort(s)}</b></div>`).join("");
  setScreen(`
    <div class="eyebrow">${esc(m.phase||"")} ${m.week?("· Woche "+m.week):""}</div>
    <h1 style="margin:6px 0 2px">${esc(m.focus||"Workout")}</h1>
    <p class="muted" style="margin-bottom:14px">${esc(m.mode||"")}${m.plannedDurationMin?(" · ~"+m.plannedDurationMin+" min"):""} · ${S.spec.steps.length} Schritte</p>
    ${(rd.energy||rd.sleep||rd.soreness)?`<div class="card">
      <div class="eyebrow" style="margin-bottom:8px">Tagesform</div>
      <div class="chips">
        ${rd.energy?`<span class="pill">⚡ Energie ${esc(rd.energy)}/10</span>`:""}
        ${rd.sleep?`<span class="pill">😴 ${esc(rd.sleep)}</span>`:""}
        ${rd.soreness?`<span class="pill">💪 ${esc(rd.soreness)}</span>`:""}
      </div></div>`:""}
    <div class="card"><div class="eyebrow" style="margin-bottom:6px">Ablauf</div>${rows}</div>
    <div class="card">
      <div class="eyebrow" style="margin-bottom:8px">Einstellungen</div>
      <div class="field" style="margin:0 0 12px">
        <div class="lab">Ton-Guide</div>
        <div class="chips" id="soundChips">
          <span class="chip ${soundOn?'on':''}" onclick="setSoundChip(true)">🔔 An</span>
          <span class="chip ${!soundOn?'on':''}" onclick="setSoundChip(false)">🔕 Aus</span>
        </div>
      </div>
      <div class="field" style="margin:0">
        <div class="lab">Countdown vor jedem Timer</div>
        <div class="chips" id="leadChips">
          ${[3,6,10].map(n=>`<span class="chip ${LEAD_SEC==n?'on':''}" onclick="setLead(${n})">${n}s</span>`).join("")}
          <span class="chip ${LEAD_SEC==0?'on':''}" onclick="setLead(0)">aus</span>
        </div>
      </div>
    </div>`);
  setBar(`<button class="btn" onclick="startWorkout()">Los geht's</button>`);
}
function setSoundChip(v){ soundOn=v; try{localStorage.setItem("coachRunner.sound",v?"1":"0");}catch(e){}
  if(v){ unlockAudio(); beep(880,.1); } renderReady(); }
function setLead(n){ LEAD_SEC=n; try{localStorage.setItem("coachRunner.lead",String(n));}catch(e){}
  document.querySelectorAll("#leadChips .chip").forEach(c=>c.classList.toggle("on",c.textContent===(n===0?"aus":n+"s"))); }
function stepMetaShort(s){
  if(s.type==="strength")return `${s.sets}×${repText(s.repTarget)}`;
  if(s.type==="superset")return `${s.rounds} Runden`;
  if(s.type==="interval")return `${s.rounds}× ${s.workSec}s`;
  if(s.type==="circuit")return `${s.rounds} Runden`;
  if(s.type==="cardio")return `${s.durationMin} min`;
  if(s.type==="carry")return `${s.rounds}×`;
  if(s.type==="mobility")return `${(s.poses||[]).length} Posen`;
  if(s.type==="plyo")return `${s.sets}×${repText(s.repTarget)}`;
  if((s.type==="warmup"||s.type==="cooldown")&&s.durationSec)return `${Math.round(s.durationSec/60)} min`;
  return "";
}
function repText(rt){ if(Array.isArray(rt))return rt[0]+"–"+rt[1]; return String(rt); }

/* ============================================================
   RUN  — dispatcher
   ============================================================ */
function startWorkout(){ unlockAudio(); keepAwake(); S.screen="run"; S.startedAt=Date.now(); S.stepIdx=0; renderStep(); }
function topbar(){
  const tot=S.spec.steps.length, i=S.stepIdx;
  const frac=Math.min(1,(i)/tot);
  return `<div class="topbar">
    <button class="iconbtn" onclick="confirmQuit()">✕</button>
    <div class="prog-wrap">
      <div class="prog-label"><span>Schritt ${i+1} / ${tot}</span><span>${esc(stepTitle(S.spec.steps[i]))}</span></div>
      <div class="bar"><i style="width:${frac*100}%"></i></div>
    </div>
    <button class="iconbtn" onclick="toggleSound()" aria-label="Ton">${soundOn?'🔔':'🔕'}</button></div>`;
}
function nextStep(){
  Timer.stop(); UpTimer.stop();
  S.sub={};
  if(S.stepIdx < S.spec.steps.length-1){ S.stepIdx++; saveProgress(); renderStep(); }
  else { finishWorkout(); }
}
function renderStep(){
  const s=S.spec.steps[S.stepIdx];
  saveProgress();
  const r={warmup:renderChecklist,cooldown:renderChecklist,strength:renderStrength,
    superset:renderSuperset,interval:renderInterval,circuit:renderCircuit,
    cardio:renderCardio,carry:renderCarry,mobility:renderMobility,plyo:renderPlyo}[s.type];
  if(r) r(s); else { skipStep("Unbekannter Schritt-Typp: "+s.type); }
}
function skipStep(reason){
  const rs=S.result.steps[S.stepIdx]; rs.status="skipped"; rs.skipReason=reason||"übersprungen";
  toast("Übersprungen"); nextStep();
}

/* ---- WARMUP / COOLDOWN (checklist) ---- */
function renderChecklist(s){
  if(!S.sub.checked) S.sub.checked={};
  const items=s.items||[];
  const list=items.map((it,i)=>`<div class="check ${S.sub.checked[i]?'on':''}" onclick="toggleCheck(${i})">
      <div class="box">${S.sub.checked[i]?'✓':''}</div><span>${esc(it)}</span></div>`).join("");
  setRun(`<div class="scroll-inner">
    <div class="eyebrow">${s.type==='warmup'?'Aufwärmen':'Cooldown'}</div>
    <h1 style="margin:4px 0 12px">${s.type==='warmup'?'Warmmachen':'Ausklang'}</h1>
    ${s.durationSec?`<div class="card center"><div id="cdTimer"></div>
      <div class="btn-row" style="margin-top:6px">
        <button class="btn sec sm" id="cdBtn" onclick="toggleChecklistTimer(${s.durationSec})">Timer starten</button>
      </div></div>`:""}
    <div class="card">${list||'<p class="muted">Keine Punkte angegeben.</p>'}</div></div>`);
  setBar(`<button class="btn" onclick="nextStep()">Weiter</button>`);
  if(s.durationSec) renderCdTimer(s.durationSec);
}
function renderCdTimer(total){ const el=$("cdTimer"); if(el) el.innerHTML=`<div class="big-num" style="font-size:40px">${mmss(total)}</div>`; }
let cdRunning=false;
function toggleChecklistTimer(total){
  const btn=$("cdBtn");
  if(!cdRunning){ cdRunning=true; btn.textContent="Pause";
    Timer.start(total,(rem)=>{ const el=$("cdTimer"); if(el)el.innerHTML=`<div class="big-num" style="font-size:40px">${mmss(rem)}</div>`; },
      ()=>{ cdRunning=false; cueDone(); const el=$("cdTimer"); if(el)el.innerHTML=`<div class="big-num" style="font-size:40px;color:var(--good)">fertig</div>`; if(btn)btn.textContent="Timer starten"; });
  } else { if(Timer.paused){Timer.resume();btn.textContent="Pause";} else {Timer.pause();btn.textContent="Weiter";} }
}
function toggleCheck(i){ S.sub.checked[i]=!S.sub.checked[i]; renderStep(); }

/* ---- STRENGTH ---- */
function renderStrength(s){
  const rs=S.result.steps[S.stepIdx];
  if(!rs.log) rs.log=[];
  const setNo=rs.log.length; // sets already done
  if(setNo>=s.sets){ return strengthDone(s,rs); }
  const isBW = s.load && /bw|körper|body/i.test(s.load.text||"") && (s.load.kg==null);
  const prev=rs.log[setNo-1];
  const defReps = prev?prev.reps : (Array.isArray(s.repTarget)?s.repTarget[1]:s.repTarget);
  const defLoad = prev?prev.load : (s.load&&s.load.kg!=null?s.load.kg:0);
  const defRir  = prev?prev.rir  : (s.rirTarget!=null?s.rirTarget:2);
  if(S.sub.reps==null){ S.sub.reps=defReps; S.sub.load=defLoad; S.sub.rir=defRir; }
  const done=rs.log.map((l,i)=>`<div class="set-row"><div class="n ok">${i+1}</div>
     <span>${l.reps} Wdh${l.load?(" · "+l.load+" kg"):""}</span><b class="muted" style="margin-left:auto">RIR ${l.rir}</b></div>`).join("");
  setRun(`
    <div class="eyebrow">Satz ${setNo+1} von ${s.sets} ${s.load&&s.load.perHand?"· je Seite":""}</div>
    <h1 style="margin:4px 0 2px">${esc(s.name)}</h1>
    <p class="muted" style="margin-bottom:14px">
      Ziel ${esc(repText(s.repTarget))} Wdh${s.load?(" · "+esc(s.load.text||(s.load.kg+" kg"))):""} · RIR ${esc(s.rirTarget)}</p>
    ${s.lastTime?`<div class="note" style="margin-bottom:14px">↩ Letztes Mal: ${esc(s.lastTime)}</div>`:""}
    <div class="card">
      ${stepperField("Wiederholungen","reps",1,"Wdh")}
      ${isBW?"":loadField(s)}
      ${stepperField("RIR (Reserve)","rir",1,"RIR",0,6)}
    </div>
    ${done?`<div class="card"><div class="eyebrow" style="margin-bottom:4px">Erledigt</div>${done}</div>`:""}`);
  setBar(`<div class="btn-row">
      <button class="btn sec sm" style="flex:none;width:46%" onclick="skipExercise()">Übung überspringen</button>
      <button class="btn" onclick="logSet()">${setNo+1<s.sets?"Satz fertig → Pause":"Satz fertig"}</button>
    </div>`);
}
function loadField(s){
  const bells=S.spec.availableBells;
  let chips="";
  if(Array.isArray(bells)&&bells.length){
    chips=`<div class="chips" style="margin-top:8px">${bells.map(b=>`<span class="chip ${S.sub.load==b?'on':''}" onclick="setVal('load',${b})">${b}</span>`).join("")}</div>`;
  }
  return `<div class="field"><div class="lab">Last <span class="hint">kg ${s.load&&s.load.perHand?"je Hand":""}</span></div>
    <div class="stepper">
      <button onclick="bump('load',-2)">–</button>
      <div class="val"><b class="tnum" id="v-load">${S.sub.load}</b><small>kg</small></div>
      <button onclick="bump('load',2)">+</button>
    </div>${chips}</div>`;
}
function stepperField(label,key,step,unit,min,max){
  const mn=(min!=null)?min:"null", mx=(max!=null)?max:"null";
  return `<div class="field"><div class="lab">${label}</div>
    <div class="stepper">
      <button onclick="bump('${key}',${-step},${mn},${mx})">–</button>
      <div class="val"><b class="tnum" id="v-${key}">${S.sub[key]}</b><small>${unit}</small></div>
      <button onclick="bump('${key}',${step},${mn},${mx})">+</button>
    </div></div>`;
}
function bump(key,delta,min,max){
  let v=(S.sub[key]||0)+delta;
  if(min!=null && v<min) v=min;
  if(max!=null && v>max) v=max;
  if(v<0) v=0;
  S.sub[key]=v; const el=$("v-"+key); if(el)el.textContent=v;
  if(key==="load"){ document.querySelectorAll(".chip").forEach(c=>{ c.classList.toggle("on", Number(c.textContent)===v); }); }
}
function setVal(key,v){ S.sub[key]=v; const el=$("v-"+key); if(el)el.textContent=v;
  document.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",Number(c.textContent)===v)); }
function logSet(){
  const s=S.spec.steps[S.stepIdx], rs=S.result.steps[S.stepIdx];
  const entry={reps:S.sub.reps,rir:S.sub.rir};
  if(S.sub.load) entry.load=S.sub.load;
  rs.log.push(entry);
  S.sub.reps=null;
  if(rs.log.length<s.sets){ startRest(s.restSec||75); }
  else { rs.status="done"; cueDone(); renderStep(); }
}
function strengthDone(s,rs){
  // shown only momentarily before nextStep auto? We render a confirm + auto-advance via Weiter
  const avg=(arr,k)=>Math.round(arr.reduce((a,x)=>a+(x[k]||0),0)/arr.length);
  setRun(`
    <div class="eyebrow">Übung erledigt</div>
    <h1 style="margin:4px 0 12px">${esc(s.name)} ✓</h1>
    <div class="card">${rs.log.map((l,i)=>`<div class="set-row"><div class="n ok">${i+1}</div>
        <span>${l.reps} Wdh${l.load?(" · "+l.load+" kg"):""}</span><b class="muted" style="margin-left:auto">RIR ${l.rir}</b></div>`).join("")}</div>
    <div class="field"><div class="lab">Notiz zur Übung (optional)</div>
      <textarea class="txt" id="exNote" placeholder="z.B. fühlte sich leicht an, nächstes Mal schwerer">${esc(rs.note||"")}</textarea></div>`);
  setBar(`<button class="btn good" onclick="saveExNote();nextStep()">Weiter</button>`);
}
function saveExNote(){ const t=$("exNote"); if(t) S.result.steps[S.stepIdx].note=t.value.trim()||undefined; }
function skipExercise(){
  const rs=S.result.steps[S.stepIdx];
  const why=prompt("Übung überspringen — kurzer Grund (optional):")||"";
  rs.status="skipped"; rs.skipReason=why.trim()||"übersprungen";
  if(rs.log&&!rs.log.length) delete rs.log;
  toast("Übung übersprungen"); nextStep();
}

/* ---- PLYO (Sprungkraft / Plyometrie) — Qualität & Explosivität statt Versagen, kein RIR ---- */
function renderPlyo(s){
  const rs=S.result.steps[S.stepIdx];
  if(!rs.log) rs.log=[];
  const setNo=rs.log.length;
  if(setNo>=s.sets){ return plyoDone(s,rs); }
  const hasLoad = s.load && s.load.kg!=null;
  const prev=rs.log[setNo-1];
  const defReps = prev?prev.reps:(Array.isArray(s.repTarget)?s.repTarget[0]:s.repTarget);
  const defLoad = prev?prev.load:(hasLoad?s.load.kg:0);
  if(S.sub.reps==null){ S.sub.reps=defReps; S.sub.load=defLoad; }
  const done=rs.log.map((l,i)=>`<div class="set-row"><div class="n ok">${i+1}</div>
     <span>${l.reps} Wdh${l.load?(" · "+l.load+" kg"):""}</span></div>`).join("");
  const loadLabel = hasLoad ? (" · "+esc(s.load.text||(s.load.kg+" kg"))) : (s.load&&s.load.text?(" · "+esc(s.load.text)):"");
  setRun(`
    <div class="eyebrow">Satz ${setNo+1} von ${s.sets} · Sprungkraft</div>
    <h1 style="margin:4px 0 2px">${esc(s.name)}</h1>
    <p class="muted" style="margin-bottom:12px">
      Ziel ${esc(repText(s.repTarget))} Wdh${s.boxHeightCm?(" · Box "+s.boxHeightCm+" cm"):""}${loadLabel}</p>
    <div class="note" style="margin-bottom:14px">⚡ Explosiv, sauber landen — volle Erholung zwischen den Sätzen, <b>nicht</b> bis zur Erschöpfung.</div>
    ${s.note?`<div class="note" style="margin-bottom:14px">${esc(s.note)}</div>`:""}
    ${s.lastTime?`<div class="note" style="margin-bottom:14px">↩ Letztes Mal: ${esc(s.lastTime)}</div>`:""}
    <div class="card">
      ${stepperField("Wiederholungen","reps",1,"Wdh")}
      ${hasLoad?plyoLoadField():""}
    </div>
    ${done?`<div class="card"><div class="eyebrow" style="margin-bottom:4px">Erledigt</div>${done}</div>`:""}`);
  setBar(`<div class="btn-row">
      <button class="btn sec sm" style="flex:none;width:46%" onclick="skipExercise()">Übung überspringen</button>
      <button class="btn" onclick="logPlyo()">${setNo+1<s.sets?"Satz fertig → Pause":"Satz fertig"}</button>
    </div>`);
}
function plyoLoadField(){
  return `<div class="field"><div class="lab">Last <span class="hint">kg</span></div>
    <div class="stepper">
      <button onclick="bump('load',-2)">–</button>
      <div class="val"><b class="tnum" id="v-load">${S.sub.load}</b><small>kg</small></div>
      <button onclick="bump('load',2)">+</button>
    </div></div>`;
}
function logPlyo(){
  const s=S.spec.steps[S.stepIdx], rs=S.result.steps[S.stepIdx];
  const entry={reps:S.sub.reps};
  if(S.sub.load) entry.load=S.sub.load;
  rs.log.push(entry);
  S.sub.reps=null;
  if(rs.log.length<s.sets){ startRest(s.restSec||90); }
  else { rs.status="done"; cueDone(); renderStep(); }
}
function plyoDone(s,rs){
  setRun(`
    <div class="eyebrow">Übung erledigt</div>
    <h1 style="margin:4px 0 12px">${esc(s.name)} ✓</h1>
    <div class="card">${rs.log.map((l,i)=>`<div class="set-row"><div class="n ok">${i+1}</div>
        <span>${l.reps} Wdh${l.load?(" · "+l.load+" kg"):""}</span></div>`).join("")}</div>
    <div class="field"><div class="lab">Notiz zur Übung (optional)</div>
      <textarea class="txt" id="exNote" placeholder="z.B. Landung sauber, nächstes Mal Box +10 cm">${esc(rs.note||"")}</textarea></div>`);
  setBar(`<button class="btn good" onclick="saveExNote();nextStep()">Weiter</button>`);
}

/* ---- REST timer (between sets) ---- */
function startRest(sec){
  setRun(`<div class="phase-rest" style="margin-top:14px">
    <div class="eyebrow center" style="color:var(--rest)">Pause</div>
    <div class="timer" id="restWrap">${ring(1,"Pause",mmss(sec))}</div>
    <div class="card center"><p class="muted" style="font-size:13.5px">Nächster Satz vorbereitet — Werte vom letzten Satz übernommen.</p></div>
  </div>`);
  setBar(`<div class="btn-row">
    <button class="btn sec" style="flex:none;width:34%" onclick="Timer.add(30)">+30s</button>
    <button class="btn" onclick="Timer.stop();renderStep()">Pause überspringen</button>
  </div>`);
  Timer.start(sec,(rem,dur)=>{ const w=$("restWrap"); if(w) w.innerHTML=ring(rem/dur,"Pause",mmss(rem)); if(Math.ceil(rem)===3)cueTick(); },
    ()=>{ cueWork(); renderStep(); });
}

/* ---- SUPERSET ---- */
function renderSuperset(s){
  const rs=S.result.steps[S.stepIdx]; if(!rs.log)rs.log=[];
  if(!S.sub.started && !rs.log.length){ return supersetIntro(s); }
  const exN=s.exercises.length, total=s.rounds*exN, done=rs.log.length;
  if(done>=total){ rs.status="done"; return supersetDone(s,rs); }
  const round=Math.floor(done/exN), exI=done%exN, ex=s.exercises[exI];
  const prev=rs.log[done-exN]; // same exercise prev round
  const defReps=prev?prev.reps:(Array.isArray(ex.repTarget)?ex.repTarget[1]:ex.repTarget);
  const defLoad=prev?prev.load:(ex.load&&ex.load.kg!=null?ex.load.kg:(ex.load&&/bw/i.test(ex.load.text||"")?0:0));
  const defRir =prev?prev.rir :(ex.rirTarget!=null?ex.rirTarget:2);
  if(S.sub.reps==null){ S.sub.reps=defReps; S.sub.load=defLoad; S.sub.rir=defRir; }
  const bw = ex.load && /bw|körper|body/i.test(ex.load.text||"");
  setRun(`
    <div class="eyebrow">Runde ${round+1}/${s.rounds} · Übung ${exI+1}/${exN}</div>
    <h1 style="margin:4px 0 2px">${esc(ex.name)}</h1>
    <p class="muted" style="margin-bottom:14px">Ziel ${esc(repText(ex.repTarget))} Wdh${ex.load?(" · "+esc(ex.load.text||(ex.load.kg+" kg"))):""}${ex.rirTarget!=null?(" · RIR "+ex.rirTarget):""}</p>
    ${s.lastTime&&round===0&&exI===0?`<div class="note" style="margin-bottom:14px">↩ Letztes Mal: ${esc(s.lastTime)}</div>`:""}
    <div class="card">
      ${stepperField("Wiederholungen","reps",1,"Wdh")}
      ${bw?"":loadField2(ex)}
      ${ex.rirTarget!=null?stepperField("RIR","rir",1,"RIR",0,6):""}
    </div>`);
  const isLastInRound = exI===exN-1;
  setBar(`<button class="btn" onclick="logSuperset(${isLastInRound})">${isLastInRound&&round+1<s.rounds?"Runde fertig → Pause":"Erledigt"}</button>`);
}
function supersetIntro(s){
  const rows=(s.exercises||[]).map((ex,i)=>`<div class="ov-row"><span class="oi">${String.fromCharCode(65+i)}</span><span>${esc(ex.name)}</span><span class="od">${esc(repText(ex.repTarget))} Wdh${ex.load?(" · "+esc(ex.load.text||(ex.load.kg+" kg"))):""}</span></div>`).join("");
  setRun(`
    <div class="eyebrow">Schritt ${S.stepIdx+1} / ${S.spec.steps.length} · Übersicht</div>
    <h1 style="margin:4px 0 4px">${esc(s.label||"Superset")}</h1>

/* ---- INTERVAL (emom / intervals / tabata) ---- */
function buildPhases(s){
  const ph=[], rot=(s.rotation&&s.rotation.length)?s.rotation:[s.label||"Arbeit"];
  let workCount=0;
  for(let r=0;r<s.rounds;r++){
    if(s.scheme==="emom"){
      // EMOM: jede Runde = ein voller Arbeits-Slot (Reps + Rest innerhalb des Slots)
      ph.push({kind:"work",sec:s.workSec||60,move:rot[r%rot.length],round:r});
    } else {
      // intervals / tabata: Arbeit, dann Pause (außer nach der letzten Runde)
      ph.push({kind:"work",sec:s.workSec||20,move:rot[workCount%rot.length],round:r});
      workCount++;
      if((s.restSec||0)>0 && r<s.rounds-1) ph.push({kind:"rest",sec:s.restSec,round:r});
    }
  }
  return ph;
}
function renderInterval(s){
  if(!S.sub.started){ return intervalIntro(s); }
  if(!S.sub.phases){ S.sub.phases=buildPhases(s); S.sub.pi=0; S.sub.running=false; }
  intervalShow(s);
}
function intervalIntro(s){
  const rot=(s.rotation&&s.rotation.length)?s.rotation:[s.label||"Arbeit"];
  const work=s.workSec||(s.scheme==="emom"?60:20);
  const rows=rot.map((m,i)=>`<div class="ov-row"><span class="oi">${i+1}</span><span>${esc(m)}</span></div>`).join("");
  setRun(`
    <div class="eyebrow">Schritt ${S.stepIdx+1} / ${S.spec.steps.length} · Übersicht</div>
    <h1 style="margin:4px 0 4px">${esc(stepTitle(s))}</h1>
    <p class="muted" style="margin-bottom:14px">${esc(s.scheme.toUpperCase())} · ${s.rounds} Runden · ${work}s Arbeit${(s.restSec&&s.scheme!=="emom")?(" · "+s.restSec+"s Pause"):""}${s.repTargetPerRound?(" · Ziel "+esc(s.repTargetPerRound)+" Wdh/Runde"):""}${s.load?(" · "+esc(s.load.text||s.load)):""}</p>
    <div class="card"><div class="eyebrow" style="margin-bottom:6px">Bewegungen${rot.length>1?" (rotieren)":""}</div>${rows}</div>
    ${s.note?`<div class="note">${esc(s.note)}</div>`:""}`);
  setBar(`<button class="btn" onclick="ivBegin()">Verstanden — Countdown</button>`);
}
function ivBegin(){
  const s=S.spec.steps[S.stepIdx];
  S.sub.started=true; S.sub.phases=buildPhases(s); S.sub.pi=0; S.sub.running=true;
  const first=S.sub.phases[0];
  leadIn(getLead(), first&&first.move?first.move:(s.label||"Arbeit"), ()=>runPhase());
}
function intervalShow(s){
  const ph=S.sub.phases, i=S.sub.pi, p=ph[i];
  if(!p){ return intervalLog(s); }
  const cls=p.kind==="work"?"phase-work":"phase-rest";
  const workRounds=ph.filter(x=>x.kind==="work").length;
  const wIdx=ph.slice(0,i+1).filter(x=>x.kind==="work").length;
  setRun(`<div class="${cls}">
    <div class="center" style="margin:6px 0 2px">
      <span class="pill ${p.kind==='work'?'work':'rest'}">${p.kind==='work'?"ARBEIT":"PAUSE"} · ${s.scheme.toUpperCase()}</span>
    </div>
    <h1 class="center" style="margin:10px 0 0;font-size:24px">${esc(p.move||(p.kind==='rest'?'Pause':''))}</h1>
    <p class="center muted" style="margin-bottom:2px">${p.kind==='work'?("Runde "+wIdx+" / "+workRounds):"locker"}${s.repTargetPerRound&&p.kind==='work'?(" · Ziel "+s.repTargetPerRound+" Wdh"):""}${s.load&&p.kind==='work'?(" · "+esc(s.load.text||s.load)):""}</p>
    <div class="timer" id="ivWrap">${ring(1,p.kind==='work'?"arbeit":"pause",mmss(p.sec))}</div>
    ${s.note?`<div class="note">${esc(s.note)}</div>`:""}
  </div>`);
  if(!S.sub.running){
    setBar(`<button class="btn" onclick="ivStart()">${i===0?"Intervall starten":"Weiter"}</button>`);
  } else {
    setBar(`<div class="btn-row">
      <button class="btn sec" style="flex:none;width:34%" onclick="ivPause()">${Timer.paused?"Weiter":"Pause"}</button>
      <button class="btn" onclick="ivSkip()">Phase überspringen</button></div>`);
  }
}
function ivStart(){ S.sub.running=true; runPhase(); }
function runPhase(){
  const s=S.spec.steps[S.stepIdx], ph=S.sub.phases, p=ph[S.sub.pi];
  if(!p) return intervalLog(s);
  intervalShow(s);
  if(p.kind==="work")cueWork(); else cueRest();
  Timer.start(p.sec,(rem,dur)=>{ const w=$("ivWrap"); if(w)w.innerHTML=ring(rem/dur,p.kind==='work'?"arbeit":"pause",mmss(rem));
      if(Math.ceil(rem)===3)cueTick(); },
    ()=>{ S.sub.pi++; if(S.sub.pi<ph.length){ runPhase(); } else { cueDone(); intervalLog(s); } });
}
function ivPause(){ if(Timer.paused){Timer.resume();}else{Timer.pause();} intervalShow(S.spec.steps[S.stepIdx]); }
function ivSkip(){ Timer.stop(); S.sub.pi++; const s=S.spec.steps[S.stepIdx];
  if(S.sub.pi<S.sub.phases.length) runPhase(); else intervalLog(s); }
function intervalLog(s){
  Timer.stop();
  const rs=S.result.steps[S.stepIdx]; rs.status="done";
  const workRounds=S.sub.phases.filter(x=>x.kind==="work").length;
  setRun(`<div class="eyebrow">Intervall fertig</div>
    <h1 style="margin:4px 0 10px">${esc(s.label||"Intervall")} ✓</h1>
    <div class="note" style="margin-bottom:14px">${workRounds} Arbeitsrunden absolviert.</div>
    ${s.repTargetPerRound?`<div class="field"><div class="lab">Ø Wdh pro Runde (optional)</div>
      <input class="txt tnum" id="ivReps" inputmode="numeric" placeholder="${esc(s.repTargetPerRound)}"></div>`:""}
    <div class="field"><div class="lab">Notiz (optional)</div><textarea class="txt" id="exNote" placeholder="z.B. letzte 2 Runden hart"></textarea></div>`);
  setBar(`<button class="btn good" onclick="saveInterval(${workRounds})">Weiter</button>`);
}
function saveInterval(rounds){
  const s=S.spec.steps[S.stepIdx], rs=S.result.steps[S.stepIdx];
  const repsEl=$("ivReps"), reps=repsEl&&repsEl.value?Number(repsEl.value):null;

/* ---- CIRCUIT (core finisher) ---- */
function buildCircuit(s){
  const ph=[];
  for(let r=0;r<s.rounds;r++){
    s.stations.forEach((st)=>{
      if(st.perSide && st.durationSec){
        ph.push({timed:true,sec:st.durationSec,name:st.name+" (links)",round:r});
        ph.push({timed:true,sec:st.durationSec,name:st.name+" (rechts)",round:r});
      } else if(st.durationSec){
        ph.push({timed:true,sec:st.durationSec,name:st.name,round:r});
      } else {
        ph.push({timed:false,reps:st.reps,name:st.name+(st.perSide?" (pro Seite)":""),round:r,load:st.load});
      }
    });
    if((s.restBetweenRoundsSec||0)>0 && r<s.rounds-1) ph.push({timed:true,sec:s.restBetweenRoundsSec,name:"Pause",rest:true,round:r});
  }
  return ph;
}
function renderCircuit(s){
  if(!S.sub.started){ return circuitIntro(s); }
  if(!S.sub.phases){ S.sub.phases=buildCircuit(s); S.sub.pi=0; S.sub.running=false; }
  circuitShow(s);
}
function circuitIntro(s){
  const rows=(s.stations||[]).map(st=>{
    const meta = st.durationSec ? (secLabel(st.durationSec)+(st.perSide?" /Seite":""))
               : ((st.reps!=null?st.reps+" Wdh":"")+(st.perSide?" /Seite":""));
    return `<div class="ov-row"><span>${esc(st.name)}</span><span class="od">${esc(meta)}</span></div>`;
  }).join("");
  const ph=buildCircuit(s);
  const est=Math.max(1,Math.round(ph.reduce((a,x)=>a+(x.timed?x.sec:8),0)/60));
  setRun(`
    <div class="eyebrow">Schritt ${S.stepIdx+1} / ${S.spec.steps.length} · Übersicht</div>
    <h1 style="margin:4px 0 4px">${esc(stepTitle(s))}</h1>
    <p class="muted" style="margin-bottom:14px">${s.rounds} Runden${s.restBetweenRoundsSec?(" · "+s.restBetweenRoundsSec+"s Rundenpause"):""} · ~${est} min</p>
    <div class="card"><div class="eyebrow" style="margin-bottom:6px">Stationen (pro Runde)</div>${rows}</div>`);
  setBar(`<button class="btn" onclick="ccBegin()">Verstanden — Countdown</button>`);
}
function ccBegin(){
  const s=S.spec.steps[S.stepIdx];
  S.sub.started=true; S.sub.phases=buildCircuit(s); S.sub.pi=0;
  const first=S.sub.phases[0];
  if(first && first.timed){ S.sub.running=true; leadIn(getLead(), first.name, ()=>ccRun()); }
  else { S.sub.running=false; circuitShow(s); }
}
function circuitShow(s){
  const ph=S.sub.phases, p=ph[S.sub.pi];
  if(!p){ return circuitDone(s); }
  const cls=p.rest?"phase-rest":"phase-work";
  setRun(`<div class="${cls}">
    <div class="center" style="margin:6px 0"><span class="pill ${p.rest?'rest':'work'}">${esc(s.label||"Core")} · Runde ${p.round+1}/${s.rounds}</span></div>
    <h1 class="center" style="margin:8px 0 0;font-size:23px">${esc(p.name)}</h1>
    ${p.timed?`<div class="timer" id="ccWrap">${ring(1,p.rest?"pause":"halten",mmss(p.sec))}</div>`
      :`<div class="center" style="padding:34px 0"><div class="big-num" style="font-size:64px;color:var(--accent)">${esc(p.reps||"")}</div><div class="t-sub" style="color:var(--muted)">Wiederholungen${p.load?(" · "+esc(p.load.text||p.load)):""}</div></div>`}
  </div>`);
  if(p.timed){
    if(!S.sub.running) setBar(`<button class="btn" onclick="ccStart()">${S.sub.pi===0?"Core starten":"Weiter"}</button>`);
    else setBar(`<div class="btn-row"><button class="btn sec" style="flex:none;width:34%" onclick="ccPause()">${Timer.paused?"Weiter":"Pause"}</button>
      <button class="btn" onclick="ccSkip()">Überspringen</button></div>`);
  } else {
    setBar(`<button class="btn" onclick="ccNextManual()">Station fertig</button>`);
  }
}
function ccStart(){ S.sub.running=true; ccRun(); }
function ccRun(){
  const s=S.spec.steps[S.stepIdx], ph=S.sub.phases, p=ph[S.sub.pi];
  if(!p) return circuitDone(s);
  circuitShow(s);
  if(!p.timed) return;
  if(p.rest)cueRest(); else cueWork();
  Timer.start(p.sec,(rem,dur)=>{ const w=$("ccWrap"); if(w)w.innerHTML=ring(rem/dur,p.rest?"pause":"halten",mmss(rem)); if(Math.ceil(rem)===3)cueTick(); },
    ()=>{ ccAdvance(); });
}
function ccAdvance(){ S.sub.pi++; const s=S.spec.steps[S.stepIdx];
  if(S.sub.pi<S.sub.phases.length){ const np=S.sub.phases[S.sub.pi]; if(np.timed) ccRun(); else { S.sub.running=false; circuitShow(s);} }
  else { cueDone(); circuitDone(s); } }
function ccNextManual(){ S.sub.pi++; const s=S.spec.steps[S.stepIdx];
  if(S.sub.pi<S.sub.phases.length){ const np=S.sub.phases[S.sub.pi]; if(np.timed){S.sub.running=true;ccRun();}else circuitShow(s); }
  else { cueDone(); circuitDone(s); } }
function ccPause(){ if(Timer.paused)Timer.resume();else Timer.pause(); circuitShow(S.spec.steps[S.stepIdx]); }
function ccSkip(){ Timer.stop(); ccAdvance(); }
function circuitDone(s){
  Timer.stop(); const rs=S.result.steps[S.stepIdx]; rs.status="done"; rs.done=true;
  setRun(`<div class="eyebrow">Core fertig</div>
    <h1 style="margin:4px 0 12px">${esc(s.label||"Core-Finisher")} ✓</h1>
    <div class="field"><div class="lab">Notiz (optional)</div><textarea class="txt" id="exNote"></textarea></div>`);
  setBar(`<button class="btn good" onclick="saveExNote();nextStep()">Weiter</button>`);
}

/* ---- MOBILITY (RomWOD / Yin) — ruhige Holds, Recovery, kein Trainingsreiz ---- */
function buildMobility(s){
  const ph=[], rounds=s.rounds||1, rest=s.restBetweenRoundsSec||0;
  for(let r=0;r<rounds;r++){
    (s.poses||[]).forEach(p=>{
      if(p.perSide){
        ph.push({sec:p.durationSec||60,name:p.name,side:"links",cue:p.cue,round:r});
        ph.push({sec:p.durationSec||60,name:p.name,side:"rechts",cue:p.cue,round:r});
      } else {
        ph.push({sec:p.durationSec||60,name:p.name,cue:p.cue,round:r});
      }
    });
    if(rest>0 && r<rounds-1) ph.push({sec:rest,name:"Pause",rest:true,round:r});
  }
  return ph;
}
function renderMobility(s){
  if(!S.sub.started){ return mobilityIntro(s); }

  mobilityShow(s);
}
function mobilityIntro(s){

  const est=Math.max(1,Math.round(ph.reduce((a,x)=>a+x.sec,0)/60));
  const rows=(s.poses||[]).map(p=>{
    const meta=secLabel(p.durationSec||60)+(p.perSide?" /Seite":"");
    return `<div class="ov-row"><span>${esc(p.name)}</span><span class="od">${esc(meta)}</span></div>`;
  }).join("");
  setRun(`
    <div class="eyebrow">Schritt ${S.stepIdx+1} / ${S.spec.steps.length} · Übersicht</div>
    <h1 style="margin:4px 0 4px">${esc(s.label||"Mobility")}</h1>
    <p class="muted" style="margin-bottom:14px">${(s.poses||[]).length} Posen${(s.rounds&&s.rounds>1)?(" · "+s.rounds+" Runden"):""} · ~${est} min · ruhig & atemgeführt</p>
    <div class="card"><div class="eyebrow" style="margin-bottom:6px">Ablauf</div>${rows}</div>`);
  setBar(`<button class="btn" onclick="moBegin()">Verstanden — Countdown</button>`);
}
function moBegin(){
  const s=S.spec.steps[S.stepIdx];
  S.sub.started=true; S.sub.phases=buildMobility(s); S.sub.pi=0; S.sub.running=true;
  const first=S.sub.phases[0];

}
function mobilityShow(s){
  const ph=S.sub.phases, i=S.sub.pi, p=ph[i];
  if(!p){ return mobilityDone(s); }

  setRun(`<div class="phase-rest">
    <div class="center" style="margin:6px 0">

    </div>

      <button class="btn sec" style="flex:none;width:34%" onclick="moPause()">${Timer.paused?"Weiter":"Pause"}</button>

}
function moStart(){ S.sub.running=true; moRun(); }
function moRun(){

function moPause(){ if(Timer.paused)Timer.resume();else Timer.pause(); mobilityShow(S.spec.steps[S.stepIdx]); }

function mobilityDone(s){

}

/* ---- CARDIO ---- */
function renderCardio(s){

  if(!S.sub.cardioStarted){
    const z=s.targetHr;
    setRun(`
      <div class="eyebrow">${({row:"Rudern",run:"Laufen",bike:"Bike"})[s.modality]||"Ausdauer"}</div>
      <h1 style="margin:4px 0 12px">${targetMin} min ${z?z.zone:""}</h1>
      <div class="card">
        ${z&&!isBike?`<div class="kv"><span>Ziel-HF</span><b>${z.min}–${z.max} <span class="muted">(${z.zone})</span></b></div>`:""}
        ${isBike?`<div class="kv"><span>Ziel</span><b>Zone 2 · blau-grün</b></div><div class="kv"><span>Trittfrequenz</span><b>80–95 RPM</b></div>`:""}
        ${s.targetSpm?`<div class="kv"><span>Schlagzahl</span><b>${Array.isArray(s.targetSpm)?s.targetSpm.join("–"):s.targetSpm} spm</b></div>`:""}
      </div>

function cardioGo(targetSec){ S.sub.cardioStarted=true; S.sub.targetCued=false; const s=S.spec.steps[S.stepIdx];
  leadIn(getLead(), ({row:"Rudern",run:"Laufen",bike:"Bike"})[s.modality]||"Los geht's", ()=>{
    cardioRunning(s,targetSec,s.modality==="bike"); cueWork();
    UpTimer.start((e)=>{ const w=$("upWrap"); if(!w)return;
      const frac=Math.min(1,e/targetSec); w.innerHTML=ring(frac,"verstrichen",mmss(e));
      if(!S.sub.targetCued && e>=targetSec){ S.sub.targetCued=true; cueDone(); toast("Zielzeit erreicht 🎉"); } });
  }); }
function cardioRunning(s,targetSec,isBike){
  const z=s.targetHr, e=UpTimer.elapsed?UpTimer.elapsed():0;
  const frac=Math.min(1,e/targetSec);
  setRun(`<div class="phase-work">
    <div class="center" style="margin:6px 0"><span class="pill ${(!isBike&&z)?'z2':'work'}">${z?("Ziel "+z.min+"–"+z.max+" · "+z.zone):"Zone 2"}</span></div>
    <div class="timer" id="upWrap">${ring(frac,"verstrichen",mmss(e))}</div>
    <p class="center muted" style="margin-top:-6px">Ziel ${Math.round(targetSec/60)} min · ${isBike?"Watt/Farbe steuern":"HF führt, nicht das Tempo"}</p>
  </div>`);
  setBar(`<div class="btn-row">
    <button class="btn sec" style="flex:none;width:34%" onclick="cardioPause()">${UpTimer.paused?"Weiter":"Pause"}</button>
    <button class="btn" onclick="cardioFinish()">Fertig → eintragen</button></div>`);
}
function cardioPause(){ if(UpTimer.paused)UpTimer.resume();else UpTimer.pause(); cardioRunning(S.spec.steps[S.stepIdx],(S.spec.steps[S.stepIdx].durationMin||30)*60,S.spec.steps[S.stepIdx].modality==="bike"); }
function cardioFinish(){
  const s=S.spec.steps[S.stepIdx]; const elapsed=Math.round(UpTimer.elapsed()); UpTimer.stop();
  const isBike=s.modality==="bike", isRow=s.modality==="row", isRun=s.modality==="run";
  S.sub.elapsed=elapsed;
  setRun(`<div class="eyebrow">${({row:"Rudern",run:"Laufen",bike:"Bike"})[s.modality]}</div>
    <h1 style="margin:4px 0 4px">Werte eintragen</h1>
    <p class="muted" style="margin-bottom:14px">Zeit gestoppt: <b>${mmss(elapsed)}</b> — vom Gerät ablesen.</p>
    <div class="card">
      <div class="field"><div class="lab">Distanz <span class="hint">${isRun?"km":"Meter"}</span></div>
        <input class="txt tnum" id="cDist" inputmode="decimal" placeholder="${isRow?'z.B. 7000':isRun?'z.B. 6.5':'z.B. 18000'}"></div>
      ${isRow?`<div class="field"><div class="lab">Ø-Split <span class="hint">/500m</span></div><input class="txt" id="cSplit" placeholder="z.B. 2:12"></div>
        <div class="field"><div class="lab">Schlagzahl <span class="hint">spm</span></div><input class="txt tnum" id="cSpm" inputmode="numeric" placeholder="z.B. 20"></div>`:""}
      ${isRun?`<div class="field"><div class="lab">Tempo <span class="hint">min/km</span></div><input class="txt" id="cPace" placeholder="z.B. 5:45"></div>`:""}
      ${isBike?`<div class="field"><div class="lab">Ø-Watt</div><input class="txt tnum" id="cWatt" inputmode="numeric" placeholder="z.B. 150"></div>
        <div class="field"><div class="lab">Farbzone</div><div class="chips" id="cColor">
          ${["weiß","blau","grün","gelb","orange","rot"].map(c=>`<span class="chip" onclick="pickColor(this,'${c}')">${c}</span>`).join("")}</div></div>
        <div class="field"><div class="lab">Trittfrequenz <span class="hint">RPM</span></div><input class="txt tnum" id="cRpm" inputmode="numeric" placeholder="z.B. 88"></div>`:""}
      ${!isBike?`<div class="field"><div class="lab">Ø-HF <span class="hint">bpm — bestimmt die Zone</span></div>
        <input class="txt tnum" id="cHr" inputmode="numeric" placeholder="z.B. 140" oninput="showZone()"><div id="zoneOut" style="margin-top:8px"></div></div>`:""}
      <div class="field"><div class="lab">Notiz (optional)</div><textarea class="txt" id="exNote"></textarea></div>
    </div>`);
  setBar(`<button class="btn good" onclick="saveCardio()">Speichern → weiter</button>`);
}
function pickColor(el,c){ document.querySelectorAll("#cColor .chip").forEach(x=>x.classList.remove("on")); el.classList.add("on"); S.sub.color=c; }
function showZone(){ const hr=Number($("cHr").value); const out=$("zoneOut"); if(!out)return;
  if(!hr){out.innerHTML="";return;} const z=zoneForHr(hr); const info=HR_ZONES.find(x=>x.z===z);
  const inZ2 = z==="Z2"; out.innerHTML=`<span class="pill ${inZ2?'z2':''}">${z} · ${info?info.name:""}</span> ${inZ2?'<span class="muted" style="font-size:13px">— Grundlage getroffen 👌</span>':''}`; }
function saveCardio(){
  const s=S.spec.steps[S.stepIdx], rs=S.result.steps[S.stepIdx];
  const v=id=>{const e=$(id);return e&&e.value.trim()?e.value.trim():undefined;};
  const isRun=s.modality==="run";
  let dist=v("cDist");
  let distM = dist!=null ? (isRun ? Math.round(parseFloat(dist)*1000) : Math.round(parseFloat(dist))) : undefined;
  const hr=v("cHr");
  rs.result={
    durationSec:S.sub.elapsed,
    distanceM:distM,
    avgSplit:v("cSplit"), spm:v("cSpm")?Number(v("cSpm")):undefined,
    pace:v("cPace"),
    avgWatt:v("cWatt")?Number(v("cWatt")):undefined, colorZone:S.sub.color,
    rpm:v("cRpm")?Number(v("cRpm")):undefined,
    avgHr:hr?Number(hr):undefined, zone:hr?zoneForHr(Number(hr)):undefined,
    note:v("exNote")
  };
  rs.status="done";
  if(s.modality==="row" && distM){ S.sub.rowMeters=distM; }
  nextStep();
}

/* ---- CARRY ---- */
function renderCarry(s){
  const rs=S.result.steps[S.stepIdx]; if(!rs.log)rs.log=[];
  const done=rs.log.length;
  if(done>=s.rounds){ rs.status="done";
    setRun(`<div class="eyebrow">Carry fertig</div><h1 style="margin:4px 0 12px">${esc(s.name)} ✓</h1>
      <div class="field"><div class="lab">Notiz</div><textarea class="txt" id="exNote"></textarea></div>`);
    setBar(`<button class="btn good" onclick="saveExNote();nextStep()">Weiter</button>`); return; }
  const timed=!!s.durationSec;
  setRun(`<div class="eyebrow">Runde ${done+1}/${s.rounds}</div>
    <h1 style="margin:4px 0 4px">${esc(s.name)}</h1>
    <p class="muted" style="margin-bottom:14px">${s.load?esc(s.load.text||(s.load.kg+" kg")):""}${s.distanceM?(" · "+s.distanceM+" m"):""}${s.durationSec?(" · "+s.durationSec+" s"):""}</p>
    ${timed?`<div class="timer phase-work" id="carryWrap">${ring(1,"carry",mmss(s.durationSec))}</div>`:`<div class="note">Strecke gehen, dann „Runde fertig".</div>`}`);
  if(timed) setBar(`<button class="btn" onclick="carryGo(${s.durationSec})">Starten</button>`);
  else setBar(`<button class="btn" onclick="carryLog()">Runde fertig</button>`);
}
function carryGo(sec){ leadIn(getLead(),"Carry",()=>{ cueWork(); Timer.start(sec,(rem,dur)=>{const w=$("carryWrap");if(w)w.innerHTML=ring(rem/dur,"carry",mmss(rem));if(Math.ceil(rem)===3)cueTick();},()=>{cueDone();carryLog();}); }); }
function carryLog(){ const rs=S.result.steps[S.stepIdx]; rs.log.push({done:true}); renderStep(); }

/* ============================================================
   FINISH / summary
   ============================================================ */
function finishWorkout(){ S.screen="summary"; buildSummary("completed"); }
function buildSummary(status){
  Timer.stop(); UpTimer.stop();
  const r=S.result, m=r.meta||(r.meta={});
  const now=new Date();
  m.date=now.toISOString().slice(0,10); m.weekday=WD[now.getDay()];
  const actualMin=S.startedAt?Math.round((Date.now()-S.startedAt)/60000):null;
  // tallies
  let hardSets=0, rowMeters=0;
  r.steps.forEach(s=>{
    if((s.type==="strength"||s.type==="superset") && Array.isArray(s.log) && s.status!=="skipped") hardSets+=s.log.length;
    if(s.type==="cardio" && s.modality==="row" && s.result && s.result.distanceM) rowMeters+=s.result.distanceM;
  });
  const before=Number(r.rowingMetersBefore)||0;
  r.summary={
    status:status,
    actualDurationMin:actualMin,
    totalHardSets:hardSets,
    rowingMetersThisSession:rowMeters,
    rowingMetersAfter: before+rowMeters,
    overallNotes:""
  };
  renderSummary(rowMeters,before);
}
function renderSummary(rowMeters,before){
  const r=S.result, su=r.summary;
  const after=su.rowingMetersAfter;
  const milestone = before>0 && rowMeters>0 ? milestoneMsg(before,after) : null;
  const skipped=r.steps.filter(s=>s.status==="skipped").length;
  setScreen(`
    <div class="eyebrow">${su.status==="completed"?"Geschafft":su.status==="shortened"?"Verkürzt — zählt trotzdem":"Abgebrochen"}</div>
    <h1 style="margin:6px 0 14px">${su.status==="aborted"?"Session beendet":"Session fertig 💪"}</h1>
    <div class="card flush" style="display:flex;text-align:center">
      <div style="flex:1;padding:18px 6px"><div class="big-num" style="font-size:34px">${su.actualDurationMin??"–"}</div><div class="t-sub" style="color:var(--muted)">Minuten</div></div>
      <div style="flex:1;padding:18px 6px;border-left:1px solid var(--line);border-right:1px solid var(--line)"><div class="big-num" style="font-size:34px">${su.totalHardSets}</div><div class="t-sub" style="color:var(--muted)">harte Sätze</div></div>
      <div style="flex:1;padding:18px 6px"><div class="big-num" style="font-size:34px">${rowMeters?(rowMeters>=1000?(rowMeters/1000).toFixed(1)+"k":rowMeters):"–"}</div><div class="t-sub" style="color:var(--muted)">Ruder-m</div></div>
    </div>
    ${milestone?`<div class="card celebrate"><div class="eyebrow">Ruder-Meter</div>
      <div style="font-weight:750;margin-top:4px">${esc(milestone)}</div>
      <div class="muted" style="margin-top:4px;font-size:13px">Gesamt: ${after.toLocaleString("de-DE")} m</div></div>`:""}
    ${skipped?`<div class="note" style="margin-bottom:14px">${skipped} Schritt(e) übersprungen — steht im Result für den Coach.</div>`:""}
    <div class="field"><div class="lab">Gesamt-Notiz für den Coach</div>
      <textarea class="txt" id="sumNote" rows="3" placeholder="Wie war's? Was war zu leicht/schwer?"></textarea></div>
    <div class="card"><div class="eyebrow" style="margin-bottom:8px">Result-Block</div>
      <p class="muted" style="font-size:13.5px;margin-bottom:10px">Kopieren und in den Coach-Chat einfügen — der Coach schreibt daraus dein Logbuch.</p>
      <button class="btn good" onclick="copyResult()">📋 In Zwischenablage kopieren</button>
      <div style="height:9px"></div>
      <button class="btn sec sm" onclick="downloadResult()">Als Datei sichern</button>
    </div>
    <button class="btn ghost" onclick="restartAll()">Neues Workout laden</button>`);
  setBar(``);
}
function milestoneMsg(before,after){
  const marks=[10000,25000,50000,100000,250000,500000,1000000,2000000,5000000];
  for(const mk of marks){ if(before<mk && after>=mk){
    return mk>=1000000?`🏅 ${(mk/1000000)}-Millionen-Meter-Marke geknackt!`:`🎯 ${mk.toLocaleString("de-DE")} m-Marke erreicht!`; } }
  const k=Math.floor(after/100000), kb=Math.floor(before/100000);
  if(k>kb) return `📈 ${(k*100000).toLocaleString("de-DE")} m überschritten — weiter Richtung Million!`;
  return null;
}
function resultJSON(){
  const n=$("sumNote"); if(n) S.result.summary.overallNotes=n.value.trim();
  S.result.schemaVersion=SCHEMA;
  // strip transient defaults from spec leftovers
  return "```json\n"+JSON.stringify(S.result,null,2)+"\n```";
}
function copyResult(){
  const txt=resultJSON();
  const done=()=>{toast("Kopiert ✓ — in den Coach-Chat einfügen");};
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done,()=>fallbackCopy(txt,done)); }
  else fallbackCopy(txt,done);
}
function fallbackCopy(txt,done){ const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");done();}catch(e){alert("Bitte manuell kopieren.");} document.body.removeChild(ta); }
function downloadResult(){
  const n=$("sumNote"); if(n) S.result.summary.overallNotes=n.value.trim(); S.result.schemaVersion=SCHEMA;
  const blob=new Blob([JSON.stringify(S.result,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  const d=S.result.meta.date||"session"; a.href=url; a.download=`workout-result-${d}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  clearSaved();
}

/* ============================================================
   QUIT / shorten
   ============================================================ */
function confirmQuit(){
  Timer.stop(); UpTimer.stop(); Lead.active=false; S.sub.running=false;
  setRun(`<div style="padding-top:20px">
    <h1 style="margin-bottom:8px">Session beenden?</h1>
    <p class="muted" style="margin-bottom:18px">Eine verkürzte Session zählt trotzdem — Konsistenz schlägt Perfektion.</p>
    <div class="card stack-sm">
      <button class="btn" onclick="endShortened()">Jetzt abschließen & Result erzeugen</button>
      <button class="btn sec sm" onclick="renderStep()">Weiter trainieren</button>
      <button class="btn ghost" onclick="hardQuit()">Komplett verwerfen</button>
    </div></div>`);
  setBar(``);
}
function endShortened(){
  // mark remaining steps as skipped
  for(let i=S.stepIdx;i<S.result.steps.length;i++){
    const rs=S.result.steps[i];
    if(rs.status!=="done"){ if(!(rs.log&&rs.log.length)){ rs.status="skipped"; rs.skipReason=rs.skipReason||"Session verkürzt"; } }
  }
  S.screen="summary"; buildSummary("shortened");
}
function hardQuit(){ if(confirm("Wirklich verwerfen? Nichts wird gespeichert.")){ clearSaved(); renderImport(); } }

/* ============================================================
   autosave (crash recovery only)
   ============================================================ */
function saveProgress(){ try{ localStorage.setItem(SAVE_KEY,JSON.stringify({
  spec:S.spec,result:S.result,stepIdx:S.stepIdx,startedAt:S.startedAt,ts:Date.now()})); }catch(e){} }
function loadSaved(){ try{ const raw=localStorage.getItem(SAVE_KEY); if(!raw)return null;
  const o=JSON.parse(raw); if(!o.spec||Date.now()-o.ts>1000*60*60*8) return null; return o; }catch(e){return null;} }
function resumeSaved(){ const o=loadSaved(); if(!o)return renderImport();
  S.spec=o.spec; S.result=o.result; S.stepIdx=o.stepIdx; S.startedAt=o.startedAt; S.sub={};
  unlockAudio(); keepAwake(); S.screen="run"; renderStep(); }
function discardSaved(){ clearSaved(); renderImport(); }
function clearSaved(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }
function restartAll(){ clearSaved(); S={screen:"import",spec:null,result:null,stepIdx:0,sub:{},startedAt:null}; renderImport(); }

/* ============================================================
   layout helper — wrap scroll content height
   ============================================================ */

/* ---------- boot ---------- */
renderImport();
</script>
</body>
</html>
